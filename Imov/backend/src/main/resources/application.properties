spring.application.name=Imov

# ConfiguraÓÐo do Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/db_imov?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=masterkey
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ConfiguraÓÐo do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ConfiguraÓÐo do Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.sql-migration-suffixes=.sql

# ConfiguraÓÐo JWT
jwt.secret=minha-chave-jwt-super-secreta-2024-imov-system-application-segura-256-bits
jwt.expiration=604800000
# 7 dias em millisegundos = 7 * 24 * 60 * 60 * 1000