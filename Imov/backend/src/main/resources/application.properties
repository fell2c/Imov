spring.application.name=Imov

# Configuracao do Banco de Dados (valores via variavel de ambiente; default apenas para dev local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_imov?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:masterkey}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracao do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuracao do Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.sql-migration-suffixes=.sql

# Upload de imagens
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# Configuracao JWT (o segredo DEVE vir de variavel de ambiente em producao)
jwt.secret=${JWT_SECRET:dev-secret-trocar-em-producao-256-bits-minimo-para-hs256-ok}
jwt.expiration=${JWT_EXPIRATION:604800000}
# 7 dias em millisegundos = 7 * 24 * 60 * 60 * 1000
# Credenciais de e-mail vem das variaveis de ambiente MAIL_USERNAME / MAIL_PASSWORD (ver MailUtil)
